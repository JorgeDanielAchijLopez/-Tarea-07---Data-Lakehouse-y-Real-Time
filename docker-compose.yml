services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: retailx_kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3

  spark-master:
    image: apache/spark:3.5.1-java17-python3
    container_name: retailx_spark_master
    hostname: spark-master
    user: root
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
    environment:
      SPARK_MASTER_HOST: spark-master
    volumes:
      - ./scripts:/opt/bitnami/spark/scripts
      - ./data:/opt/bitnami/spark/data
      - ./lakehouse:/opt/bitnami/spark/lakehouse
      - ./checkpoints:/opt/bitnami/spark/checkpoints
      - ./powerbi:/opt/bitnami/spark/powerbi

  spark-worker:
    image: apache/spark:3.5.1-java17-python3
    container_name: retailx_spark_worker
    hostname: spark-worker
    user: root
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    environment:
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
    volumes:
      - ./scripts:/opt/bitnami/spark/scripts
      - ./data:/opt/bitnami/spark/data
      - ./lakehouse:/opt/bitnami/spark/lakehouse
      - ./checkpoints:/opt/bitnami/spark/checkpoints
      - ./powerbi:/opt/bitnami/spark/powerbi

  producer:
    image: python:3.11-slim
    container_name: retailx_producer
    working_dir: /app
    command: sh -c "python -m pip install --no-cache-dir kafka-python && tail -f /dev/null"
    volumes:
      - ./scripts:/app
    depends_on:
      - kafka